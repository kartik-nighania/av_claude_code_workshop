name: HealthTrack AI Review Pipeline
on:
  pull_request:
    branches: [main]
    paths: ["backend/**", "frontend/**"]
  workflow_dispatch:
    inputs:
      deploy_to:
        description: "Deploy to"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
          - development

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: AI Security Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--max-turns 100 --model claude-haiku-4-5"
          prompt: |
            You are a security engineer. Review the code and architecture doc provided.
            FOCUS ONLY ON:
            - OWASP Top 10
            - Injection (SQL, NoSQL, command, template)
            - Broken authentication / authorization
            - Sensitive data exposure (secrets, PII, tokens in logs/responses)
            - provide the findings in a json format: and categorize by severity: critical, high, medium, low
            - if you find any critical findings then fail the build
