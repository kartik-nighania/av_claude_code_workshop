# OrderTrack — full production stack: api, frontend, db (postgres), cache (redis).
# Values come from .env (see .env.example). Bring it up with: docker compose up -d

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis ----
  cache:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Flask API ----
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ORDER_STATUS_CACHE_TTL: ${ORDER_STATUS_CACHE_TTL}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "${API_PORT}:8010"
    restart: unless-stopped

  # ---- React frontend (built with Vite, served by nginx, proxies /api -> api) ----
  frontend:
    build:
      context: .
      dockerfile_inline: |
        FROM node:20-alpine AS build
        WORKDIR /app
        COPY frontend/package*.json ./
        RUN npm ci
        COPY frontend/ ./
        RUN npm run build

        FROM nginx:alpine
        COPY --from=build /app/dist /usr/share/nginx/html
        RUN printf 'server {\n  listen 80;\n  location / {\n    root /usr/share/nginx/html;\n    try_files $$uri /index.html;\n  }\n  location /api/ {\n    proxy_pass http://api:8010;\n  }\n}\n' > /etc/nginx/conf.d/default.conf
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped

volumes:
  pgdata:
