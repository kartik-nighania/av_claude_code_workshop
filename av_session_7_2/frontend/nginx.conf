# nginx serves the built SPA and proxies API calls to the api service.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown routes return index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend calls to the api service (compose DNS name "api").
    location /api/ {
        proxy_pass http://api:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://api:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
