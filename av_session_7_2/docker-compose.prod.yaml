# OrderTrack — production stack. api/frontend run from prebuilt ECR images
# (pulled on every `up`); db/cache run locally. Values come from .env on the host.
#   docker compose -f docker-compose.prod.yaml up -d

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis ----
  cache:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Flask API (from ECR) ----
  api:
    image: 100099319985.dkr.ecr.ap-south-1.amazonaws.com/av-claude-ecr:backend-latest
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      ORDER_STATUS_CACHE_TTL: ${ORDER_STATUS_CACHE_TTL}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "${API_PORT}:8010"
    restart: unless-stopped

  # ---- React frontend (from ECR; nginx serves SPA + proxies /api -> api) ----
  frontend:
    image: 100099319985.dkr.ecr.ap-south-1.amazonaws.com/av-claude-ecr:frontend-latest
    pull_policy: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT}:80"
    restart: unless-stopped

volumes:
  pgdata:
