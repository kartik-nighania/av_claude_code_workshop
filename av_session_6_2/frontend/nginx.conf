server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service (no CORS needed).
    # Trailing slash on proxy_pass strips the /api/ prefix:
    #   /api/metrics -> http://api:8000/metrics
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Lightweight liveness endpoint used by the container healthcheck.
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # SPA fallback — let the client router handle unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
